packages:
  "framer-motion": "For stunning page transitions, modal animations, and chat bubble entry effects"
  "react-markdown": "To beautifully render AI-generated markdown responses"
  "remark-gfm": "For markdown tables and advanced formatting in chat"
  "date-fns": "For formatting project timestamps cleanly"
  "clsx": "Utility for constructing className strings conditionally"
  "tailwind-merge": "Utility to safely merge Tailwind CSS classes without style conflicts"

images:
  - path: "artifacts/app-builder/public/images/hero-abstract.png"
    description: "Dark, sleek abstract glowing 3D grid with cyan and indigo laser lines, professional developer tool aesthetic, deep pitch black background, high resolution"
    aspect_ratio: "16:9"
  - path: "artifacts/app-builder/public/images/logo.png"
    description: "Minimalist modern geometric AI cube logo mark in glowing cyan and blue gradient on transparent background"
    aspect_ratio: "1:1"

notes:
  - The frontend defaults to a dark mode aesthetic as requested.
  - SSE parsing buffers incomplete chunks to reliably handle the chat stream.
  - Preview panel automatically reloads via a custom event dispatched by the SSE stream when previewUpdated=true.
