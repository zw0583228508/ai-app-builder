openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Adaptive AI Platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: projects
    description: Project management operations
  - name: messages
    description: Project AI chat messages
  - name: Auth
    description: Browser and mobile authentication endpoints.
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /projects:
    get:
      operationId: listProjects
      tags: [projects]
      summary: List all projects
      responses:
        "200":
          description: List of projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"
    post:
      operationId: createProject
      tags: [projects]
      summary: Create a new project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectBody"
      responses:
        "201":
          description: Created project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"

  /projects/{id}:
    get:
      operationId: getProject
      tags: [projects]
      summary: Get a project with its messages
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Project with messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectWithMessages"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    put:
      operationId: updateProject
      tags: [projects]
      summary: Update a project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProjectBody"
      responses:
        "200":
          description: Updated project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    delete:
      operationId: deleteProject
      tags: [projects]
      summary: Delete a project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /projects/{id}/mode:
    put:
      operationId: updateProjectMode
      tags: [projects]
      summary: Update the user mode for a project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProjectModeBody"
      responses:
        "200":
          description: Updated project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /projects/{id}/messages:
    get:
      operationId: listProjectMessages
      tags: [messages]
      summary: List messages in a project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProjectMessage"
    post:
      operationId: sendProjectMessage
      tags: [messages]
      summary: Send a message to the AI builder (SSE stream)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendMessageBody"
      responses:
        "200":
          description: SSE stream of AI response chunks
          content:
            text/event-stream: {}
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /projects/{id}/preview:
    get:
      operationId: getProjectPreview
      tags: [projects]
      summary: Get the generated HTML preview for a project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: HTML content of the generated project
          content:
            text/html: {}
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /auth/user:
    get:
      tags: [Auth]
      operationId: getCurrentAuthUser
      summary: Get the currently authenticated user
      responses:
        '200':
          description: Auth status resolved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserEnvelope'

  /login:
    get:
      tags: [Auth]
      operationId: beginBrowserLogin
      summary: Start the browser OIDC login flow
      parameters:
        - name: returnTo
          in: query
          required: false
          schema:
            type: string
      responses:
        '302':
          description: Redirect to the OIDC authorization endpoint.

  /callback:
    get:
      tags: [Auth]
      operationId: handleBrowserLoginCallback
      summary: Complete the browser OIDC login flow
      parameters:
        - name: code
          in: query
          required: false
          schema:
            type: string
        - name: state
          in: query
          required: false
          schema:
            type: string
      responses:
        '302':
          description: Redirect to the returnTo path on success.

  /logout:
    get:
      tags: [Auth]
      operationId: logoutBrowserSession
      summary: Clear the session and begin OIDC logout
      responses:
        '302':
          description: Redirect to the OIDC provider logout URL.

components:
  schemas:
    AuthUser:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
          nullable: true
        firstName:
          type: string
          nullable: true
        lastName:
          type: string
          nullable: true
        profileImageUrl:
          type: string
          nullable: true
      required:
        - id

    AuthUserEnvelope:
      type: object
      properties:
        user:
          oneOf:
            - $ref: '#/components/schemas/AuthUser'
            - type: 'null'

    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    UserMode:
      type: string
      enum: [entrepreneur, builder, developer]

    BusinessContext:
      type: object
      properties:
        audience:
          type: string
          nullable: true
        goal:
          type: string
          nullable: true
        industry:
          type: string
          nullable: true
        kpis:
          type: string
          nullable: true

    Project:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
          nullable: true
        type:
          type: string
          enum: [website, webapp, landing, portfolio, mobile, other]
        previewHtml:
          type: string
          nullable: true
        userMode:
          $ref: "#/components/schemas/UserMode"
        skillScore:
          type: integer
        businessContext:
          $ref: "#/components/schemas/BusinessContext"
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - type
        - userMode
        - skillScore
        - createdAt
        - updatedAt

    ProjectWithMessages:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
          nullable: true
        type:
          type: string
          enum: [website, webapp, landing, portfolio, mobile, other]
        previewHtml:
          type: string
          nullable: true
        userMode:
          $ref: "#/components/schemas/UserMode"
        skillScore:
          type: integer
        businessContext:
          $ref: "#/components/schemas/BusinessContext"
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        messages:
          type: array
          items:
            $ref: "#/components/schemas/ProjectMessage"
      required:
        - id
        - title
        - type
        - userMode
        - skillScore
        - createdAt
        - updatedAt
        - messages

    ProjectMessage:
      type: object
      properties:
        id:
          type: integer
        projectId:
          type: integer
        role:
          type: string
          enum: [user, assistant]
        content:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - projectId
        - role
        - content
        - createdAt

    CreateProjectBody:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        type:
          type: string
          enum: [website, webapp, landing, portfolio, mobile, other]
        userMode:
          $ref: "#/components/schemas/UserMode"
      required:
        - title
        - type

    UpdateProjectBody:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        previewHtml:
          type: string

    UpdateProjectModeBody:
      type: object
      properties:
        userMode:
          $ref: "#/components/schemas/UserMode"
      required:
        - userMode

    Attachment:
      type: object
      properties:
        name:
          type: string
        type:
          type: string
        data:
          type: string
      required:
        - name
        - type
        - data

    SendMessageBody:
      type: object
      properties:
        content:
          type: string
        attachments:
          type: array
          items:
            $ref: "#/components/schemas/Attachment"
      required:
        - content

    ApiError:
      type: object
      properties:
        error:
          type: string
      required:
        - error
